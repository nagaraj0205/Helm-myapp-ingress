# Configuration for App 1 (Frontend)
appOne:
  name: frontend-app
  replicas: 2
  image: nginx:latest
  containerPort: 80
  servicePort: 80

# Configuration for App 2 (Backend)
appTwo:
  name: backend-app
  replicas: 2
  image: httpd:latest
  containerPort: 80
  servicePort: 8080

# Global Ingress Configuration
ingress:
  enabled: true
  className: nginx
  host: a0174d933b6c24d4a86edf7a26ffc863-1060078839.ap-south-2.elb.amazonaws.com

# Custom HTML Content
htmlContent:
  frontend: |
    <!DOCTYPE html>
    <html>
    <head><title>Frontend App</title></head>
    <body><h1>Welcome to the Frontend Application!</h1></body>
    </html>
  backend: |
    <!DOCTYPE html>
    <html>
    <head><title>Backend API</title></head>
    <body><h1>Welcome to the Backend API Stub!</h1></body>
    </html>

